controller_manager:
  ros__parameters:
    use_sim_time: True
    update_rate: 250  # Hz

    joint_states_controller:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_group_effort_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_group_effort_controller:
  ros__parameters:
    use_sim_time: True
    joints:
        - lf_hip_joint
        - lf_upper_leg_joint
        - lf_lower_leg_joint
        - rf_hip_joint
        - rf_upper_leg_joint
        - rf_lower_leg_joint
        - lh_hip_joint
        - lh_upper_leg_joint
        - lh_lower_leg_joint
        - rh_hip_joint
        - rh_upper_leg_joint
        - rh_lower_leg_joint
    # POSITION command interface (EE26/Harmonic): the effort+PID path (gains p=100, tuned for
    # Gazebo Classic/ODE) oscillates on Harmonic's DART physics -> the dog twitches chaotically
    # even holding a stand, then falls. gz_ros2_control applies a position command through gz's
    # stable internal joint controller, so CHAMP's gait angles are tracked smoothly with no
    # ROS-side PID to detune. Real-Go2 deployment is unaffected (there we send /cmd_vel to the
    # onboard sport controller, never joint-level). See go2-sim/docs ADR-011.
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    open_loop_control: true
    allow_integration_in_goal_trajectories: true
    constraints:
      stopped_velocity_tolerance: 0.0   # don't abort the gait stream on velocity tolerance
      goal_time: 0.0                    # start immediately

