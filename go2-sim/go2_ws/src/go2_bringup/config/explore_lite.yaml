# explore_lite (m-explore-ros2) — the PROVEN frontier explorer (ADR-014). Replaces our custom
# frontier_explorer. KEY ROBUSTNESS: it detects frontiers on the Nav2 GLOBAL COSTMAP (not the raw
# SLAM /map), so every goal it emits sits next to FREE costmap space -> the planner can always reach
# it. Our custom node sent /map goals that were lethal/inflated in the costmap -> NavFn failed -> the
# robot got stuck/circled. explore_lite + Nav2's own abort+blacklist solve that by construction.
# "/**" wildcard so the params apply whatever the node is auto-named.
/**:
  ros__parameters:
    use_sim_time: true
    robot_base_frame: base_link
    costmap_topic: /global_costmap/costmap          # <-- the costmap, NOT /map (the whole fix)
    costmap_updates_topic: /global_costmap/costmap_updates
    visualize: true                                 # publishes /explore/frontiers MarkerArray for RViz
    planner_frequency: 0.33                          # re-evaluate best frontier every ~3 s (responsive, no thrash)
    progress_timeout: 25.0                           # blacklist a frontier if no progress in 25 s
    potential_scale: 3.0                             # distance penalty (prefer near)
    gain_scale: 1.0                                  # frontier-size reward (prefer large/informative)
    orientation_scale: 0.0                           # (unused in this port)
    transform_tolerance: 0.3
    min_frontier_size: 0.3                           # warehouse aisles produce small frontiers -> keep low
    return_to_init: false                            # don't drive back to start when done
